name: Deploy to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege permissions the Pages deployment needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth 0 so any step that reads git history (e.g. a page's
        # last-changed date) sees more than the single latest commit.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        # Version comes from the packageManager field in package.json.
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # Astro 7 needs >= 22.12; check-sun.mjs uses --experimental-strip-types.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ONE definition of "build". `pnpm build` runs the same prebuild gates
      # (sun geometry, type scale, figure provenance, OG cards) and postbuild
      # gates (search index, internal links, unrendered markup) that run
      # locally — rather than an ad-hoc subset re-listed here that drifts.
      #
      # The old workflow used the withastro action, which runs `astro build`
      # directly and so skipped every npm hook: the search index, the sun
      # check, the link and markup checks never ran on a real deploy. It also
      # ran the figure check first with no node_modules, which broke the moment
      # that check started importing sharp to read image dimensions.
      - name: Build and verify
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
