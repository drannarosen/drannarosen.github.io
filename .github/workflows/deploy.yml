name: Deploy to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege permissions the Pages deployment needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Runs BEFORE the build, so a figure that drifted from its recorded
      # provenance blocks the deploy rather than shipping unnoticed. Needs no
      # dependencies — plain Node reading files in this repo.
      - name: Verify figure provenance
        run: node scripts/figures/check.mjs

      - name: Verify every font-size uses the type scale
        run: node scripts/check-type.mjs

      - name: Build Astro site
        # Auto-detects pnpm from the lockfile, runs `astro build`, and
        # uploads the dist/ artifact for the deploy job.
        uses: withastro/action@v3
        with:
          # Node 24 (current). Astro 7 requires >= 22.12; the action defaults to 20.
          node-version: 24

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
